<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2f6f66">
    <meta name="description" content="PWA privado para organizar rotina, saúde e orientações da criança no OneDrive.">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/icons/app-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icons/app-icon.svg">
    <link rel="stylesheet" href="assets/css/styles.css">
    <title>App Maria Elis</title>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Pular para o conteúdo</a>
    <noscript>Ative o JavaScript para usar esta aplicação.</noscript>
    <div id="app" class="app-shell"></div>
    <script>
      (function () {
        function showStartupError(message) {
          var app = document.getElementById('app');
          if (!app || app.dataset.startupErrorShown === 'true') return;
          app.dataset.startupErrorShown = 'true';
          app.innerHTML = '<main class="fatal"><h1>Não foi possível abrir o app</h1><p>Atualize a página e tente novamente.</p><p class="muted">' + String(message || 'Erro de carregamento').replace(/[&<>]/g, '') + '</p></main>';
        }
        window.addEventListener('error', function (event) { showStartupError(event.message); });
        window.addEventListener('unhandledrejection', function (event) { showStartupError(event.reason && event.reason.message); });
      }());
    </script>    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.4/lib/msal-browser.min.js" crossorigin="anonymous"></script>
    <script type="module" src="assets/js/app.js?v=11"></script>
  </body>
</html>
